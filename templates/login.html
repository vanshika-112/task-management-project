{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Login to manage your tasks.</p>
        <form method="POST">
            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >
            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >
            <button type="submit">
                Login
            </button>
        </form>

        <p class="bottom-text">
            Don't have an account?
            <a href="/register">Register</a>
        </p>
    </div>
</div>
{% endblock %}
